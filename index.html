<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kaninens Morotsspel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; touch-action: none; }
#joystick-zone {
  position: fixed; left: 0; top: 0; width: 100%; height: 100%;
  z-index: 15; pointer-events: auto;
}
#joystick-base {
  position: fixed; width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
  pointer-events: none; z-index: 16; display: none;
  transform: translate(-50%, -50%);
}
#joystick-stick {
  position: fixed; width: 50px; height: 50px; border-radius: 50%;
  background: rgba(255,255,255,0.5); border: 2px solid rgba(255,255,255,0.7);
  pointer-events: none; z-index: 17; display: none;
  transform: translate(-50%, -50%);
}
#hud {
  position: fixed; top: 20px; left: 20px; color: #fff;
  font-size: 18px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  pointer-events: none; z-index: 10;
}
#hud div { margin-bottom: 6px; }
#burrow-bar {
  width: 200px; height: 16px; background: rgba(0,0,0,0.4);
  border: 2px solid #fff; border-radius: 8px; overflow: hidden;
}
#burrow-fill {
  height: 100%; background: linear-gradient(90deg, #ff8c00, #ffa500);
  transition: width 0.3s;
}
#message {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font-size: 28px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
  pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.5s;
}
#instructions {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.6); font-size: 14px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  pointer-events: none; z-index: 10;
}
#minimap {
  position: fixed; bottom: 16px; right: 16px;
  width: 160px; height: 160px;
  border: 2px solid rgba(255,255,255,0.7);
  border-radius: 8px;
  background: rgba(30, 60, 30, 0.75);
  pointer-events: none; z-index: 10;
}
#volume-control {
  position: fixed; top: 20px; right: 20px; z-index: 10;
  display: flex; align-items: center; gap: 8px;
  color: #fff; font-size: 14px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
#volume-control input[type="range"] {
  width: 100px; accent-color: #ffa500; cursor: pointer;
}
#mute-btn {
  background: none; border: none; color: #fff; font-size: 20px;
  cursor: pointer; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
.floating-text {
  position: fixed; pointer-events: none; z-index: 20;
  font-weight: bold; white-space: nowrap;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7), -1px -1px 3px rgba(0,0,0,0.4);
  animation: floatUp 1.2s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  70% { opacity: 1; transform: translate(-50%, calc(-50% - 60px)) scale(1.15); }
  100% { opacity: 0; transform: translate(-50%, calc(-50% - 90px)) scale(0.8); }
}
#screen-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 5; opacity: 0;
  transition: opacity 0.1s;
}
</style>
</head>
<body>
<div id="joystick-zone"></div>
<div id="joystick-base"></div>
<div id="joystick-stick"></div>
<div id="hud">
  <div>🥕 Morötter: <span id="carrot-count">0</span></div>
  <div>🕳️ Gryta: <span id="burrow-status">0 / 20</span></div>
  <div id="burrow-bar"><div id="burrow-fill" style="width:0%"></div></div>
  <div>🏆 Poäng: <span id="score">0</span></div>
</div>
<div id="message"></div>
<div id="screen-flash"></div>
<div id="instructions"><span id="instructions-desktop">WASD för att röra dig · </span><span id="instructions-touch" style="display:none">Tryck och dra för att röra dig · </span>Samla morötter · Gå till grytan för att lämna · Undvik räven! · Vänta på 🐰 för att korsa vägar</div>
<canvas id="minimap" width="160" height="160"></canvas>
<div id="volume-control">
  <button id="mute-btn">🔊</button>
  <input type="range" id="volume-slider" min="0" max="100" value="50">
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// --- Sound Engine (Web Audio API) ---
const SoundEngine = (() => {
  let ctx = null;
  let masterGain = null;
  let musicGain = null;
  let sfxGain = null;
  let drumGain = null;
  let muted = false;
  let musicPlaying = false;
  let musicNodes = [];
  let drumLoopActive = false;
  let drumLoopTimer = null;
  let drumIntensity = 0;

  function init() {
    if (ctx) return;
    ctx = new AudioContext();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(ctx.destination);

    musicGain = ctx.createGain();
    musicGain.gain.value = 0.3;
    musicGain.connect(masterGain);

    sfxGain = ctx.createGain();
    sfxGain.gain.value = 0.6;
    sfxGain.connect(masterGain);

    drumGain = ctx.createGain();
    drumGain.gain.value = 0;
    drumGain.connect(masterGain);
  }

  function ensureContext() {
    if (!ctx) init();
    if (ctx.state === 'suspended') ctx.resume();
  }

  function setVolume(v) {
    ensureContext();
    masterGain.gain.value = v;
  }

  function toggleMute() {
    ensureContext();
    muted = !muted;
    masterGain.gain.setTargetAtTime(muted ? 0 : parseFloat(document.getElementById('volume-slider').value) / 100, ctx.currentTime, 0.02);
    return muted;
  }

  // Utility: create noise buffer
  function noiseBuffer(duration, sampleRate) {
    const sr = sampleRate || ctx.sampleRate;
    const len = sr * duration;
    const buf = ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    return buf;
  }

  // --- Sound Effects ---

  function playCarrotPickup() {
    ensureContext();
    const t = ctx.currentTime;

    // Pop tone - ascending
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.08);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
    osc.connect(gain).connect(sfxGain);
    osc.start(t);
    osc.stop(t + 0.12);

    // Crunch noise
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer(0.06);
    const nGain = ctx.createGain();
    const nFilter = ctx.createBiquadFilter();
    nFilter.type = 'bandpass';
    nFilter.frequency.value = 3000;
    nFilter.Q.value = 2;
    nGain.gain.setValueAtTime(0.15, t + 0.02);
    nGain.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
    noise.connect(nFilter).connect(nGain).connect(sfxGain);
    noise.start(t + 0.02);
    noise.stop(t + 0.08);
  }

  function playDeposit() {
    ensureContext();
    const t = ctx.currentTime;

    // Plonk - descending tone
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.2);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
    osc.connect(gain).connect(sfxGain);
    osc.start(t);
    osc.stop(t + 0.25);

    // Soft thud
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(120, t);
    osc2.frequency.exponentialRampToValueAtTime(60, t + 0.15);
    gain2.gain.setValueAtTime(0.2, t);
    gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    osc2.connect(gain2).connect(sfxGain);
    osc2.start(t);
    osc2.stop(t + 0.15);
  }

  let foxWarningOsc = null;
  let foxWarningGain = null;
  let foxWarningLfo = null;

  function updateFoxWarning(distance) {
    ensureContext();
    // Start warning when fox is within 10 units, intensify as closer
    const threshold = 10;
    if (distance > threshold) {
      if (foxWarningOsc) {
        foxWarningGain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
      }
      return;
    }

    const intensity = 1 - (distance / threshold); // 0 to 1

    if (!foxWarningOsc) {
      foxWarningOsc = ctx.createOscillator();
      foxWarningGain = ctx.createGain();
      foxWarningLfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();

      foxWarningOsc.type = 'sine';
      foxWarningOsc.frequency.value = 60;
      foxWarningLfo.type = 'sine';
      foxWarningLfo.frequency.value = 1.5;
      lfoGain.gain.value = 30;

      foxWarningLfo.connect(lfoGain).connect(foxWarningOsc.frequency);
      foxWarningOsc.connect(foxWarningGain).connect(sfxGain);

      foxWarningGain.gain.value = 0;
      foxWarningOsc.start();
      foxWarningLfo.start();
    }

    // Heartbeat rate increases with proximity
    foxWarningLfo.frequency.setTargetAtTime(1.5 + intensity * 4, ctx.currentTime, 0.1);
    foxWarningGain.gain.setTargetAtTime(intensity * 0.15, ctx.currentTime, 0.1);
    foxWarningOsc.frequency.setTargetAtTime(50 + intensity * 30, ctx.currentTime, 0.1);
  }

  // --- Dynamic drum track based on fox proximity ---

  function playDrumHit(time, type) {
    // Synthesize drum sounds using noise and oscillators
    if (type === 'kick') {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
      gain.gain.setValueAtTime(0.7, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
      osc.connect(gain).connect(drumGain);
      osc.start(time);
      osc.stop(time + 0.15);
    } else if (type === 'snare') {
      // Noise burst for snare body
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer(0.08);
      const nGain = ctx.createGain();
      const nFilter = ctx.createBiquadFilter();
      nFilter.type = 'bandpass';
      nFilter.frequency.value = 4000;
      nFilter.Q.value = 1;
      nGain.gain.setValueAtTime(0.4, time);
      nGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
      noise.connect(nFilter).connect(nGain).connect(drumGain);
      noise.start(time);
      noise.stop(time + 0.1);
      // Tonal snap
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(100, time + 0.06);
      gain.gain.setValueAtTime(0.3, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
      osc.connect(gain).connect(drumGain);
      osc.start(time);
      osc.stop(time + 0.08);
    } else if (type === 'hihat') {
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer(0.04);
      const nGain = ctx.createGain();
      const nFilter = ctx.createBiquadFilter();
      nFilter.type = 'highpass';
      nFilter.frequency.value = 8000;
      nGain.gain.setValueAtTime(0.2, time);
      nGain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
      noise.connect(nFilter).connect(nGain).connect(drumGain);
      noise.start(time);
      noise.stop(time + 0.05);
    }
  }

  function scheduleDrumMeasure() {
    if (!drumLoopActive) return;
    const t = ctx.currentTime;
    // BPM scales with intensity: 100 BPM at low intensity, 140 BPM at max
    const bpm = 100 + drumIntensity * 40;
    const beatDur = 60 / bpm;
    const beats = 8;

    for (let i = 0; i < beats; i++) {
      const beatTime = t + i * beatDur;
      // Kick on beats 0, 2, 4, 6 (quarter notes)
      if (i % 2 === 0) {
        playDrumHit(beatTime, 'kick');
      }
      // Snare on beats 2, 6 (backbeat)
      if (i === 2 || i === 6) {
        playDrumHit(beatTime, 'snare');
      }
      // Hi-hat on every beat at higher intensity
      if (drumIntensity > 0.3) {
        playDrumHit(beatTime, 'hihat');
      }
      // Extra hi-hats on off-beats at high intensity
      if (drumIntensity > 0.6 && i % 2 === 1) {
        playDrumHit(beatTime, 'hihat');
      }
    }

    const measureDur = beats * beatDur;
    drumLoopTimer = setTimeout(scheduleDrumMeasure, measureDur * 1000 - 50);
  }

  function updateDrumTrack(distance) {
    ensureContext();
    const threshold = 12;
    if (distance > threshold) {
      // Fade out and stop drum loop
      if (drumLoopActive) {
        drumGain.gain.setTargetAtTime(0, ctx.currentTime, 0.4);
        drumLoopActive = false;
        if (drumLoopTimer) {
          clearTimeout(drumLoopTimer);
          drumLoopTimer = null;
        }
      }
      drumIntensity = 0;
      return;
    }

    drumIntensity = 1 - (distance / threshold); // 0 to 1

    // Volume scales with intensity, max 0.2 to not overpower music
    const targetVol = drumIntensity * 0.2;
    drumGain.gain.setTargetAtTime(targetVol, ctx.currentTime, 0.15);

    // Start drum loop if not active
    if (!drumLoopActive) {
      drumLoopActive = true;
      scheduleDrumMeasure();
    }
  }

  function playFoxCatch() {
    ensureContext();
    const t = ctx.currentTime;

    // Cartoon "bonk" — short rounded pop
    const bonk = ctx.createOscillator();
    const bonkGain = ctx.createGain();
    bonk.type = 'sine';
    bonk.frequency.setValueAtTime(600, t);
    bonk.frequency.exponentialRampToValueAtTime(200, t + 0.15);
    bonkGain.gain.setValueAtTime(0.25, t);
    bonkGain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    bonk.connect(bonkGain).connect(sfxGain);
    bonk.start(t);
    bonk.stop(t + 0.2);

    // Comical "womp womp" — two descending triangle tones
    const womp1 = ctx.createOscillator();
    const womp1Gain = ctx.createGain();
    womp1.type = 'triangle';
    womp1.frequency.setValueAtTime(350, t + 0.15);
    womp1.frequency.exponentialRampToValueAtTime(200, t + 0.4);
    womp1Gain.gain.setValueAtTime(0.18, t + 0.15);
    womp1Gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
    womp1.connect(womp1Gain).connect(sfxGain);
    womp1.start(t + 0.15);
    womp1.stop(t + 0.4);

    const womp2 = ctx.createOscillator();
    const womp2Gain = ctx.createGain();
    womp2.type = 'triangle';
    womp2.frequency.setValueAtTime(280, t + 0.4);
    womp2.frequency.exponentialRampToValueAtTime(140, t + 0.7);
    womp2Gain.gain.setValueAtTime(0.18, t + 0.4);
    womp2Gain.gain.exponentialRampToValueAtTime(0.01, t + 0.7);
    womp2.connect(womp2Gain).connect(sfxGain);
    womp2.start(t + 0.4);
    womp2.stop(t + 0.7);
  }

  function playBurrowFull() {
    ensureContext();
    const t = ctx.currentTime;

    // Celebration fanfare - ascending arpeggio
    const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const start = t + i * 0.12;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.2, start + 0.03);
      gain.gain.setValueAtTime(0.2, start + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.01, start + 0.4);
      osc.connect(gain).connect(sfxGain);
      osc.start(start);
      osc.stop(start + 0.4);
    });

    // Shimmer noise
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer(0.6);
    const nGain = ctx.createGain();
    const nFilter = ctx.createBiquadFilter();
    nFilter.type = 'highpass';
    nFilter.frequency.value = 6000;
    nGain.gain.setValueAtTime(0.08, t);
    nGain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
    noise.connect(nFilter).connect(nGain).connect(sfxGain);
    noise.start(t);
    noise.stop(t + 0.6);
  }

  function playNewHole() {
    ensureContext();
    const t = ctx.currentTime;

    // Magical shimmer - ascending tones with vibrato
    const freqs = [330, 440, 554, 660];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const vibrato = ctx.createOscillator();
      const vGain = ctx.createGain();

      osc.type = 'sine';
      osc.frequency.value = freq;
      vibrato.type = 'sine';
      vibrato.frequency.value = 6;
      vGain.gain.value = 8;

      vibrato.connect(vGain).connect(osc.frequency);
      const start = t + i * 0.15;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.15, start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, start + 0.5);
      osc.connect(gain).connect(sfxGain);
      osc.start(start);
      osc.stop(start + 0.5);
      vibrato.start(start);
      vibrato.stop(start + 0.5);
    });
  }

  let lastHopTime = 0;
  function playHop() {
    ensureContext();
    const t = ctx.currentTime;
    if (t - lastHopTime < 0.15) return; // throttle
    lastHopTime = t;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(280, t + 0.04);
    osc.frequency.exponentialRampToValueAtTime(150, t + 0.08);
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    osc.connect(gain).connect(sfxGain);
    osc.start(t);
    osc.stop(t + 0.1);
  }

  // --- Background Music ---
  // Simple pentatonic melody loop

  function startMusic() {
    if (musicPlaying) return;
    ensureContext();
    musicPlaying = true;

    // Pentatonic scale notes (C major pentatonic across octaves)
    const scale = [262, 294, 330, 392, 440, 524, 588, 660];
    const beatDuration = 0.3;
    const measureLen = 16;

    // Generate a gentle melody pattern
    const melody = [0, 2, 4, 5, 4, 2, 3, 1, 0, 3, 5, 7, 5, 4, 2, 0];

    function playMeasure() {
      if (!musicPlaying) return;
      const t = ctx.currentTime;

      melody.forEach((noteIdx, i) => {
        const start = t + i * beatDuration;
        const freq = scale[noteIdx];

        // Melody voice
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.12, start + 0.05);
        gain.gain.setValueAtTime(0.12, start + beatDuration * 0.6);
        gain.gain.exponentialRampToValueAtTime(0.01, start + beatDuration * 0.95);
        osc.connect(gain).connect(musicGain);
        osc.start(start);
        osc.stop(start + beatDuration);

        // Soft harmony (fifth above, quieter)
        if (i % 2 === 0) {
          const osc2 = ctx.createOscillator();
          const gain2 = ctx.createGain();
          osc2.type = 'sine';
          osc2.frequency.value = freq * 1.5;
          gain2.gain.setValueAtTime(0, start);
          gain2.gain.linearRampToValueAtTime(0.04, start + 0.05);
          gain2.gain.exponentialRampToValueAtTime(0.01, start + beatDuration * 0.9);
          osc2.connect(gain2).connect(musicGain);
          osc2.start(start);
          osc2.stop(start + beatDuration);
        }

        // Bass note (every 4 beats)
        if (i % 4 === 0) {
          const bass = ctx.createOscillator();
          const bGain = ctx.createGain();
          bass.type = 'triangle';
          bass.frequency.value = freq / 2;
          bGain.gain.setValueAtTime(0, start);
          bGain.gain.linearRampToValueAtTime(0.08, start + 0.03);
          bGain.gain.exponentialRampToValueAtTime(0.01, start + beatDuration * 3.8);
          bass.connect(bGain).connect(musicGain);
          bass.start(start);
          bass.stop(start + beatDuration * 4);
        }
      });

      // Schedule next measure
      const measureDuration = measureLen * beatDuration;
      musicNodes.push(setTimeout(playMeasure, measureDuration * 1000 - 50));
    }

    playMeasure();
  }

  function stopMusic() {
    musicPlaying = false;
    musicNodes.forEach(id => clearTimeout(id));
    musicNodes = [];
  }

  return {
    init, setVolume, toggleMute, startMusic, stopMusic,
    playCarrotPickup, playDeposit, updateFoxWarning, updateDrumTrack,
    playFoxCatch, playBurrowFull, playNewHole, playHop
  };
})();

// Volume control UI
const volumeSlider = document.getElementById('volume-slider');
const muteBtn = document.getElementById('mute-btn');

volumeSlider.addEventListener('input', () => {
  SoundEngine.init();
  SoundEngine.setVolume(volumeSlider.value / 100);
});

muteBtn.addEventListener('click', () => {
  SoundEngine.init();
  const isMuted = SoundEngine.toggleMute();
  muteBtn.textContent = isMuted ? '🔇' : '🔊';
});

// Start audio on first user interaction
let audioStarted = false;
function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  SoundEngine.init();
  SoundEngine.startMusic();
}
window.addEventListener('keydown', startAudio, { once: false });
window.addEventListener('click', startAudio, { once: false });
window.addEventListener('touchstart', startAudio, { once: false });

// --- Game Config ---
const FIELD_SIZE = 40;
const CARROT_COUNT = 15;
const BURROW_CAPACITY = 20;
const FOX_SPEED = 0.04;
const RABBIT_SPEED = 0.08;

// --- Roads ---
function createRoadSegment(length, width, isHorizontal) {
  const group = new THREE.Group();
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x505050 });

  // Asphalt surface
  const roadMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(isHorizontal ? length : width, isHorizontal ? width : length),
    roadMat
  );
  roadMesh.rotation.x = -Math.PI / 2;
  roadMesh.position.y = 0.02;
  roadMesh.receiveShadow = true;
  group.add(roadMesh);

  // Dashed center line
  const dashMat = new THREE.MeshLambertMaterial({ color: 0xffff55 });
  const dashCount = Math.floor(length / 3);
  for (let i = 0; i < dashCount; i++) {
    const dash = new THREE.Mesh(
      new THREE.PlaneGeometry(isHorizontal ? 1.2 : 0.18, isHorizontal ? 0.18 : 1.2),
      dashMat
    );
    dash.rotation.x = -Math.PI / 2;
    dash.position.y = 0.025;
    const offset = (i - dashCount / 2) * 3;
    if (isHorizontal) dash.position.x = offset;
    else dash.position.z = offset;
    group.add(dash);
  }

  // Road edge lines
  const edgeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  for (const side of [-1, 1]) {
    const edge = new THREE.Mesh(
      new THREE.PlaneGeometry(isHorizontal ? length : 0.15, isHorizontal ? 0.15 : length),
      edgeMat
    );
    edge.rotation.x = -Math.PI / 2;
    edge.position.y = 0.025;
    if (isHorizontal) edge.position.z = side * width / 2;
    else edge.position.x = side * width / 2;
    group.add(edge);
  }

  // Raised curbs along road edges
  const curbMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
  for (const side of [-1, 1]) {
    const curb = new THREE.Mesh(
      new THREE.BoxGeometry(
        isHorizontal ? length : 0.2,
        0.12,
        isHorizontal ? 0.2 : length
      ),
      curbMat
    );
    curb.position.y = 0.06;
    if (isHorizontal) curb.position.z = side * (width / 2 + 0.1);
    else curb.position.x = side * (width / 2 + 0.1);
    curb.castShadow = true;
    curb.receiveShadow = true;
    group.add(curb);
  }

  return group;
}

// --- Crosswalks ---
function createCrosswalk(x, z, crossesHorizontalRoad) {
  const group = new THREE.Group();
  const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const stripeCount = 8;
  const stripeWidth = 0.4;
  const stripeLength = ROAD_WIDTH - 0.2;
  const gap = 0.15;

  for (let i = 0; i < stripeCount; i++) {
    const w = crossesHorizontalRoad ? stripeLength : stripeWidth;
    const h = crossesHorizontalRoad ? stripeWidth : stripeLength;
    const stripe = new THREE.Mesh(new THREE.PlaneGeometry(w, h), stripeMat);
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.y = 0.035;
    const offset = (i - stripeCount / 2 + 0.5) * (stripeWidth + gap);
    if (crossesHorizontalRoad) stripe.position.x = offset;
    else stripe.position.z = offset;
    group.add(stripe);
  }

  group.position.set(x, 0, z);
  return group;
}

// Crosswalk across horizontal road (at the intersection)
scene.add(createCrosswalk(ROAD_V_X, ROAD_H_Z, true));
// Crosswalk across vertical road (at the intersection)

function createTrafficLight(x, z, faceAngle) {
  const group = new THREE.Group();
  const poleMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
  const housingMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

  // Pole (thicker)
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 3.5, 8), poleMat);
  pole.position.y = 1.75;
  group.add(pole);

  // Signal housing (larger)
  const housing = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.3), housingMat);
  housing.position.y = 3.7;
  group.add(housing);

  // Glow backdrop for green signal
  const greenGlow = new THREE.Mesh(
    new THREE.CircleGeometry(0.28, 16),
    new THREE.MeshBasicMaterial({ color: 0x00ff44, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
  );
  greenGlow.position.set(0, 3.9, 0.16);
  group.add(greenGlow);

  // Glow backdrop for red signal
  const redGlow = new THREE.Mesh(
    new THREE.CircleGeometry(0.28, 16),
    new THREE.MeshBasicMaterial({ color: 0xff2200, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
  );
  redGlow.position.set(0, 3.5, 0.16);
  redGlow.visible = false;
  group.add(redGlow);

  // Green signal (rabbit) — top (scaled up)
  const rabbitSig = createRabbitSignal();
  rabbitSig.scale.set(1.4, 1.4, 1.4);
  rabbitSig.position.set(0, 3.9, 0.17);
  group.add(rabbitSig);

  // Red signal (fox) — bottom (scaled up)
  const foxSig = createFoxSignal();
  foxSig.scale.set(1.4, 1.4, 1.4);
  foxSig.position.set(0, 3.5, 0.17);
  foxSig.visible = false; // starts green
  group.add(foxSig);

  group.userData.rabbitSignal = rabbitSig;
  group.userData.foxSignal = foxSig;
  group.userData.greenGlow = greenGlow;
  group.userData.redGlow = redGlow;

  group.position.set(x, 0, z);
  group.rotation.y = faceAngle || 0;
  group.traverse(c => { if (c.isMesh) c.castShadow = true; });
  return group;
}

const CAR_COLORS = [0xcc2222, 0x2255cc, 0xcccc22, 0x22cc88];

function createCar(color) {
  const group = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const glassMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.6 });

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.45, 2.0), mat);
  body.position.y = 0.35;
  group.add(body);

  // Cabin
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.35, 1.0), glassMat);
  cabin.position.set(0, 0.75, -0.15);
  group.add(cabin);

  // Wheels
  for (const sx of [-1, 1]) {
    for (const sz of [-0.6, 0.6]) {
      const wheel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.17, 0.17, 0.12, 8),
        darkMat
      );
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(sx * 0.65, 0.17, sz);
      group.add(wheel);
    }
  }

  group.traverse(c => { if (c.isMesh) c.castShadow = true; });
  return group;
}

function shouldCarStop(car) {
  if (!pedestrianGreen) return false;
  const d = car.userData;
  const margin = ROAD_WIDTH / 2 + 1.5;

  if (d.horizontal) {
    const distAhead = (ROAD_V_X - car.position.x) * d.direction;
    return distAhead > 0 && distAhead < margin + 3;
  } else {
    const distAhead = (ROAD_H_Z - car.position.z) * d.direction;
    return distAhead > 0 && distAhead < margin + 3;
  }
}

// --- Rabbit ---
function createRabbit() {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0xd4c4a8 });
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const pinkMat = new THREE.MeshLambertMaterial({ color: 0xffb6c1 });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 10), bodyMat);
  body.scale.set(1, 0.85, 1.2);
  body.position.y = 0.45;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 8), bodyMat);
  head.position.set(0, 0.85, 0.35);
  group.add(head);

  // Ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.35, 4, 6), bodyMat);
    ear.position.set(side * 0.12, 1.3, 0.3);
    ear.rotation.z = side * 0.15;
    ear.rotation.x = -0.1;
    group.add(ear);
    const earInner = new THREE.Mesh(new THREE.CapsuleGeometry(0.035, 0.25, 4, 6), pinkMat);
    earInner.position.set(side * 0.12, 1.28, 0.32);
    earInner.rotation.z = side * 0.15;
    earInner.rotation.x = -0.1;
    group.add(earInner);
  }

  // Eyes
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), darkMat);
    eye.position.set(side * 0.13, 0.9, 0.6);
    group.add(eye);
  }

  // Nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), pinkMat);
  nose.position.set(0, 0.82, 0.65);
  group.add(nose);

  // Tail
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), whiteMat);
  tail.position.set(0, 0.45, -0.55);
  group.add(tail);

  // Feet
  for (const side of [-1, 1]) {
    const foot = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), bodyMat);
    foot.scale.set(0.8, 0.5, 1.4);
    foot.position.set(side * 0.22, 0.08, 0.15);
    group.add(foot);
  }

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  return group;
}

function isOnRoad(x, z) {
  return (Math.abs(z - ROAD_H_Z) < ROAD_WIDTH / 2 + 0.5) ||
         (Math.abs(x - ROAD_V_X) < ROAD_WIDTH / 2 + 0.5);
}

function randomFieldPos() {
  let pos;
  do {
    pos = new THREE.Vector3(
      (Math.random() - 0.5) * FIELD_SIZE,
      0,
      (Math.random() - 0.5) * FIELD_SIZE
    );
  } while (isOnRoad(pos.x, pos.z));
  return pos;
}

function createBurrow(pos) {
  const group = new THREE.Group();

  // Hole (dark circle) — sized to show up to 20 carrot indicators
  const hole = new THREE.Mesh(
    new THREE.CircleGeometry(1.1, 20),
    new THREE.MeshLambertMaterial({ color: 0x2a1a0a })
  );
  hole.rotation.x = -Math.PI / 2;
  hole.position.y = 0.01;
  group.add(hole);

  // Dirt mound ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1.1, 0.18, 8, 20),
    new THREE.MeshLambertMaterial({ color: 0x8b6914 })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.05;
  group.add(ring);

  // Small carrots inside to show fill level (added dynamically)
  group.userData.fillIndicators = [];

  group.position.copy(pos);
  group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  return group;
}

let burrow = null;
let burrowFill = 0;

function spawnBurrow() {
  if (burrow) scene.remove(burrow);
  const pos = randomFieldPos();
  pos.y = 0;
  burrow = createBurrow(pos);
  burrowFill = 0;
  scene.add(burrow);
  updateBurrowVisuals();
}

function updateBurrowVisuals() {
  // Remove old indicators
  for (const ind of burrow.userData.fillIndicators) {
    burrow.remove(ind);
  }
  burrow.userData.fillIndicators = [];

  // Add small carrots in two concentric rings to show fill
  // Inner ring (first 10): r=0.35, Outer ring (next 10): r=0.75
  const INNER_COUNT = Math.ceil(BURROW_CAPACITY / 2);
  for (let i = 0; i < burrowFill; i++) {
    const isInner = i < INNER_COUNT;
    const ringIndex = isInner ? i : i - INNER_COUNT;
    const ringTotal = isInner ? INNER_COUNT : BURROW_CAPACITY - INNER_COUNT;
    const angle = (ringIndex / ringTotal) * Math.PI * 2;
    const r = isInner ? 0.35 : 0.75;
    const mini = new THREE.Mesh(
      new THREE.ConeGeometry(0.04, 0.16, 6),
      new THREE.MeshLambertMaterial({ color: 0xff7722 })
    );
    mini.position.set(Math.cos(angle) * r, 0.12, Math.sin(angle) * r);
    mini.rotation.x = Math.PI;
    burrow.add(mini);
    burrow.userData.fillIndicators.push(mini);
  }
}

spawnBurrow();

function createTree(size) {
  const group = new THREE.Group();
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x228B22 + Math.floor(Math.random() * 0x002000) });

  const scales = { small: 0.6, medium: 1.0, large: 1.4 };
  const s = scales[size] || 1.0;

  // Trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1 * s, 0.15 * s, 1.5 * s, 6), trunkMat);
  trunk.position.y = 0.75 * s;
  group.add(trunk);

  // Foliage layers
  const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.8 * s, 1.2 * s, 8), leafMat);
  foliage1.position.y = 1.8 * s;
  group.add(foliage1);

  const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.6 * s, 0.9 * s, 8), leafMat);
  foliage2.position.y = 2.4 * s;
  group.add(foliage2);

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  return group;
}

const treeSizes = ['small', 'medium', 'large'];
for (let i = 0; i < 25; i++) {
  const tree = createTree(treeSizes[Math.floor(Math.random() * treeSizes.length)]);
  const pos = randomFieldPos();
  tree.position.copy(pos);
  tree.rotation.y = Math.random() * Math.PI * 2;
  scene.add(tree);
}

function createBush() {
  const group = new THREE.Group();
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x2d7a1e + Math.floor(Math.random() * 0x001500) });

  for (let i = 0; i < 3; i++) {
    const s = 0.25 + Math.random() * 0.2;
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(s, 8, 6), leafMat);
    sphere.position.set((Math.random() - 0.5) * 0.3, s * 0.7, (Math.random() - 0.5) * 0.3);
    sphere.scale.y = 0.7;
    group.add(sphere);
  }

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  return group;
}

// --- Houses ---
function createHouse() {
  const group = new THREE.Group();
  const wallMat = new THREE.MeshLambertMaterial({ color: 0xd4a574 });
  const roofMat = new THREE.MeshLambertMaterial({ color: 0x8b2500 });
  const doorMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
  const windowMat = new THREE.MeshLambertMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.7 });

  // Walls
  const walls = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 1.5), wallMat);
  walls.position.y = 0.75;
  group.add(walls);

  // Roof
  const roof = new THREE.Mesh(new THREE.ConeGeometry(1.6, 1.0, 4), roofMat);
  roof.position.y = 2.0;
  roof.rotation.y = Math.PI / 4;
  group.add(roof);

  // Door
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 0.05), doorMat);
  door.position.set(0, 0.4, 0.76);
  group.add(door);

  // Windows
  for (const side of [-1, 1]) {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.05), windowMat);
    win.position.set(side * 0.6, 1.0, 0.76);
    group.add(win);
  }

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  return group;
}

// --- NPC Rabbits ---
function createNPCRabbit() {
  const group = new THREE.Group();
  const colors = [0xc0b090, 0xaaa080, 0xb8a888, 0x9e8e70, 0xc8b898];
  const color = colors[Math.floor(Math.random() * colors.length)];
  const bodyMat = new THREE.MeshLambertMaterial({ color });
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const pinkMat = new THREE.MeshLambertMaterial({ color: 0xffb6c1 });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 8), bodyMat);
  body.scale.set(1, 0.85, 1.2);
  body.position.y = 0.45;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), bodyMat);
  head.position.set(0, 0.85, 0.35);
  group.add(head);

  // Ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.3, 4, 6), bodyMat);
    ear.position.set(side * 0.1, 1.25, 0.28);
    ear.rotation.z = side * 0.2;
    group.add(ear);
    const earInner = new THREE.Mesh(new THREE.CapsuleGeometry(0.03, 0.2, 4, 6), pinkMat);
    earInner.position.set(side * 0.1, 1.23, 0.3);
    earInner.rotation.z = side * 0.2;
    group.add(earInner);
  }

  // Eyes
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 4), darkMat);
    eye.position.set(side * 0.1, 0.9, 0.58);
    group.add(eye);
  }

  // Nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 4), pinkMat);
  nose.position.set(0, 0.82, 0.62);
  group.add(nose);

  // Tail
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 4), whiteMat);
  tail.position.set(0, 0.45, -0.5);
  group.add(tail);

  const scale = 0.5 + Math.random() * 0.3;
  group.scale.setScalar(scale);
  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });

  group.userData = {
    speed: 0.01 + Math.random() * 0.015,
    direction: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(),
    changeTimer: Math.random() * 3,
    state: 'walking',
    idleTimer: 0,
    hopPhase: Math.random() * Math.PI * 2
  };

  return group;
}

// --- Snake ---
function createSnake() {
  const group = new THREE.Group();
  const snakeMat = new THREE.MeshLambertMaterial({ color: 0x4a7a2e });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x2a4a1e });
  const eyeMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });

  const segments = [];
  const segCount = 8;
  for (let i = 0; i < segCount; i++) {
    const r = i === 0 ? 0.1 : Math.max(0.12 - i * 0.012, 0.04);
    const seg = new THREE.Mesh(
      new THREE.SphereGeometry(r, 8, 6),
      i % 2 === 0 ? snakeMat : darkMat
    );
    seg.position.set(0, 0.08, -i * 0.2);
    seg.scale.y = 0.6;
    group.add(seg);
    segments.push(seg);
  }

  // Eyes
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 4), eyeMat);
    eye.position.set(side * 0.06, 0.12, 0.08);
    group.add(eye);
  }

  // Tongue
  const tongue = new THREE.Mesh(
    new THREE.ConeGeometry(0.01, 0.1, 4),
    new THREE.MeshLambertMaterial({ color: 0xff0000 })
  );
  tongue.rotation.x = -Math.PI / 2;
  tongue.position.set(0, 0.06, 0.15);
  tongue.visible = false;
  group.add(tongue);

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });

  group.userData = {
    segments,
    tongue,
    speed: 0.02,
    direction: Math.random() * Math.PI * 2,
    changeTimer: 2 + Math.random() * 4,
    tongueTimer: 0,
    phase: Math.random() * Math.PI * 2
  };

  return group;
}

// --- Touch Joystick ---
const touchState = { active: false, id: null, startX: 0, startY: 0, dirX: 0, dirZ: 0 };
const joystickZone = document.getElementById('joystick-zone');
const joystickBase = document.getElementById('joystick-base');
const joystickStick = document.getElementById('joystick-stick');
const JOYSTICK_RADIUS = 50;

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  if (touchState.active) return;
  const t = e.changedTouches[0];
  touchState.active = true;
  touchState.id = t.identifier;
  touchState.startX = t.clientX;
  touchState.startY = t.clientY;
  touchState.dirX = 0;
  touchState.dirZ = 0;
  joystickBase.style.left = t.clientX + 'px';
  joystickBase.style.top = t.clientY + 'px';
  joystickBase.style.display = 'block';
  joystickStick.style.left = t.clientX + 'px';
  joystickStick.style.top = t.clientY + 'px';
  joystickStick.style.display = 'block';
}, { passive: false });

joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchState.active) return;
  for (const t of e.changedTouches) {
    if (t.identifier !== touchState.id) continue;
    let dx = t.clientX - touchState.startX;
    let dy = t.clientY - touchState.startY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > JOYSTICK_RADIUS) {
      dx = (dx / dist) * JOYSTICK_RADIUS;
      dy = (dy / dist) * JOYSTICK_RADIUS;
    }
    joystickStick.style.left = (touchState.startX + dx) + 'px';
    joystickStick.style.top = (touchState.startY + dy) + 'px';
    const norm = Math.min(dist, JOYSTICK_RADIUS) / JOYSTICK_RADIUS;
    if (norm > 0.15) {
      touchState.dirX = (dx / Math.max(dist, JOYSTICK_RADIUS)) * norm;
      touchState.dirZ = (dy / Math.max(dist, JOYSTICK_RADIUS)) * norm;
    } else {
      touchState.dirX = 0;
      touchState.dirZ = 0;
    }
  }
}, { passive: false });

function endTouch(e) {
  for (const t of e.changedTouches) {
    if (t.identifier !== touchState.id) continue;
    touchState.active = false;
    touchState.id = null;
    touchState.dirX = 0;
    touchState.dirZ = 0;
    joystickBase.style.display = 'none';
    joystickStick.style.display = 'none';
  }
}
joystickZone.addEventListener('touchend', endTouch, { passive: false });
joystickZone.addEventListener('touchcancel', endTouch, { passive: false });

// --- Minimap ---
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const MINIMAP_SIZE = 160;
const MINIMAP_FIELD = FIELD_SIZE * 2; // full field extent

function worldToMinimap(x, z) {
  return {
    x: ((x + FIELD_SIZE) / MINIMAP_FIELD) * MINIMAP_SIZE,
    y: ((-z + FIELD_SIZE) / MINIMAP_FIELD) * MINIMAP_SIZE
  };
}

function drawMinimap() {
  const ctx = minimapCtx;
  ctx.clearRect(0, 0, MINIMAP_SIZE, MINIMAP_SIZE);

  // Background
  ctx.fillStyle = 'rgba(74, 140, 63, 0.9)';
  ctx.beginPath();
  ctx.roundRect(0, 0, MINIMAP_SIZE, MINIMAP_SIZE, 6);
  ctx.fill();

  // Burrow
  if (burrow) {
    const bp = worldToMinimap(burrow.position.x, burrow.position.z);
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath();
    ctx.arc(bp.x, bp.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Carrots
  ctx.fillStyle = '#ff8c00';
  for (const c of carrots) {
    const cp = worldToMinimap(c.position.x, c.position.z);
    ctx.beginPath();
    ctx.arc(cp.x, cp.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // NPC Rabbits (light brown)
  ctx.fillStyle = '#c0a878';
  for (const npc of npcRabbits) {
    const np = worldToMinimap(npc.position.x, npc.position.z);
    ctx.beginPath();
    ctx.arc(np.x, np.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Snakes (dark green)
  ctx.fillStyle = '#4a7a2e';
  for (const s of snakes) {
    const sp = worldToMinimap(s.position.x, s.position.z);
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fox (red)
  const fp = worldToMinimap(fox.position.x, fox.position.z);
  ctx.fillStyle = '#e83030';
  ctx.beginPath();
  ctx.arc(fp.x, fp.y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Rabbit (green)
  const rp = worldToMinimap(rabbit.position.x, rabbit.position.z);
  ctx.fillStyle = '#40e040';
  ctx.beginPath();
  ctx.arc(rp.x, rp.y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// --- 3D Particle System ---
const activeParticles = [];

function spawnParticles(origin, count, color, spread = 3, lifetime = 1.0, gravity = -4) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(origin);
    mesh.position.y += 0.5;
    mesh.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * spread,
      2 + Math.random() * 3,
      (Math.random() - 0.5) * spread
    );
    mesh.userData.life = lifetime;
    mesh.userData.maxLife = lifetime;
    mesh.userData.gravity = gravity;
    scene.add(mesh);
    activeParticles.push(mesh);
  }
}

function spawnConfetti(origin, count = 30) {
  const confettiColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff, 0x44ffff, 0xff8800];
  for (let i = 0; i < count; i++) {
    const geo = new THREE.PlaneGeometry(0.12, 0.08);
    const mat = new THREE.MeshBasicMaterial({
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(origin);
    mesh.position.y += 0.5;
    mesh.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 5,
      4 + Math.random() * 4,
      (Math.random() - 0.5) * 5
    );
    mesh.userData.life = 2.0;
    mesh.userData.maxLife = 2.0;
    mesh.userData.gravity = -3;
    mesh.userData.spin = new THREE.Vector3(
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 10
    );
    scene.add(mesh);
    activeParticles.push(mesh);
  }
}

function updateParticles(dt) {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      activeParticles.splice(i, 1);
      continue;
    }
    p.userData.vel.y += p.userData.gravity * dt;
    p.position.x += p.userData.vel.x * dt;
    p.position.y += p.userData.vel.y * dt;
    p.position.z += p.userData.vel.z * dt;
    if (p.position.y < 0) {
      p.position.y = 0;
      p.userData.vel.y *= -0.3;
    }
    const alpha = p.userData.life / p.userData.maxLife;
    p.material.opacity = alpha;
    p.material.transparent = true;
    if (p.userData.spin) {
      p.rotation.x += p.userData.spin.x * dt;
      p.rotation.y += p.userData.spin.y * dt;
      p.rotation.z += p.userData.spin.z * dt;
    }
    p.scale.setScalar(0.5 + alpha * 0.5);
  }
}

// --- Burrow Blink Effect ---
let burrowBlinkTime = 0;
let burrowBlinking = false;

function startBurrowBlink() {
  burrowBlinking = true;
  burrowBlinkTime = 0;
}

function updateBurrowBlink(dt) {
  if (!burrowBlinking || !burrow) return;
  burrowBlinkTime += dt;
  if (burrowBlinkTime > 2.0) {
    burrowBlinking = false;
    burrow.children.forEach(c => {
      if (c.isMesh && c.material) c.material.emissive?.setHex(0x000000);
    });
    return;
  }
  const blink = Math.sin(burrowBlinkTime * 12) * 0.5 + 0.5;
  burrow.children.forEach(c => {
    if (c.isMesh && c.material && c.material.emissive) {
      c.material.emissive.setHex(0x443300);
      c.material.emissiveIntensity = blink * 0.8;
    }
  });
}

// --- Animation Helpers ---
let hopPhase = 0;

function animateRabbit(dt, moving) {
  if (moving) {
    hopPhase += dt * 10;
    rabbit.position.y = Math.abs(Math.sin(hopPhase)) * 0.2;
    // Slight body bob
    rabbit.children[0].position.y = 0.45 + Math.sin(hopPhase * 2) * 0.03;
  } else {
    rabbit.position.y = THREE.MathUtils.lerp(rabbit.position.y, 0, 0.1);
    // Idle ear twitch
    hopPhase += dt * 2;
  }
}

let foxAnimPhase = 0;
function animateFox(dt) {
  foxAnimPhase += dt * 8;
  fox.position.y = Math.abs(Math.sin(foxAnimPhase)) * 0.1;
}

// Carrot bob
function animateCarrots(time) {
  for (const c of carrots) {
    c.position.y = 0.1 + Math.sin(time * 2 + c.position.x * 0.5) * 0.08;
    c.rotation.y = time * 0.5;
  }
}

// --- NPC Rabbit AI ---
function updateNPCRabbits(dt) {
  for (const npc of npcRabbits) {
    const ud = npc.userData;

    if (ud.state === 'idle') {
      ud.idleTimer -= dt;
      npc.position.y = THREE.MathUtils.lerp(npc.position.y, 0, 0.1);
      if (ud.idleTimer <= 0) {
        ud.state = 'walking';
        ud.direction.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
        ud.changeTimer = 1 + Math.random() * 3;
      }
    } else {
      ud.changeTimer -= dt;
      if (ud.changeTimer <= 0) {
        if (Math.random() < 0.3) {
          ud.state = 'idle';
          ud.idleTimer = 1 + Math.random() * 3;
        } else {
          ud.direction.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
          ud.changeTimer = 1 + Math.random() * 3;
        }
      }

      npc.position.x += ud.direction.x * ud.speed;
      npc.position.z += ud.direction.z * ud.speed;

      const angle = Math.atan2(ud.direction.x, ud.direction.z);
      npc.rotation.y = THREE.MathUtils.lerp(npc.rotation.y, angle, 0.1);

      ud.hopPhase += dt * 8;
      npc.position.y = Math.abs(Math.sin(ud.hopPhase)) * 0.1 * npc.scale.x;

      const limit = FIELD_SIZE * 0.7;
      if (Math.abs(npc.position.x) > limit || Math.abs(npc.position.z) > limit ||
          isOnRoad(npc.position.x, npc.position.z)) {
        ud.direction.negate();
        npc.position.x += ud.direction.x * ud.speed * 3;
        npc.position.z += ud.direction.z * ud.speed * 3;
      }
    }
  }
}

// --- Snake AI ---
function updateSnakes(dt) {
  for (const snake of snakes) {
    const ud = snake.userData;

    ud.phase += dt * 3;
    ud.changeTimer -= dt;

    if (ud.changeTimer <= 0) {
      ud.direction += (Math.random() - 0.5) * 1.5;
      ud.changeTimer = 2 + Math.random() * 4;
    }

    snake.position.x += Math.sin(ud.direction) * ud.speed;
    snake.position.z += Math.cos(ud.direction) * ud.speed;

    const limit = FIELD_SIZE * 0.7;
    if (Math.abs(snake.position.x) > limit || Math.abs(snake.position.z) > limit ||
        isOnRoad(snake.position.x, snake.position.z)) {
      ud.direction += Math.PI;
      snake.position.x += Math.sin(ud.direction) * ud.speed * 3;
      snake.position.z += Math.cos(ud.direction) * ud.speed * 3;
    }

    // Sinusoidal body wave
    for (let i = 0; i < ud.segments.length; i++) {
      const seg = ud.segments[i];
      seg.position.x = Math.sin(ud.phase + i * 0.8) * 0.1;
      seg.position.z = -i * 0.2;
    }

    snake.rotation.y = ud.direction;

    // Tongue flicker
    ud.tongueTimer -= dt;
    if (ud.tongueTimer <= 0) {
      ud.tongue.visible = !ud.tongue.visible;
      ud.tongueTimer = ud.tongue.visible ? 0.15 : 1 + Math.random() * 3;
    }
  }
}

// --- Game Loop ---
const clock = new THREE.Clock();

function update() {
  const dt = Math.min(clock.getDelta(), 0.05);
  gameTime += dt;

  // --- Rabbit Movement ---
  const moveDir = new THREE.Vector3(0, 0, 0);
  if (keys['w'] || keys['arrowup']) moveDir.z += 1;
  if (keys['s'] || keys['arrowdown']) moveDir.z -= 1;
  if (keys['a'] || keys['arrowleft']) moveDir.x += 1;
  if (keys['d'] || keys['arrowright']) moveDir.x -= 1;
  // Touch joystick input (x maps to game x inverted, y maps to game z inverted)
  if (touchState.active && (Math.abs(touchState.dirX) > 0 || Math.abs(touchState.dirZ) > 0)) {
    moveDir.x -= touchState.dirX;
    moveDir.z -= touchState.dirZ;
  }

  const moving = moveDir.length() > 0;
  if (moving) {
    moveDir.normalize();
    rabbit.position.x += moveDir.x * RABBIT_SPEED;
    rabbit.position.z += moveDir.z * RABBIT_SPEED;

    // Face movement direction
    const angle = Math.atan2(moveDir.x, moveDir.z);
    rabbit.rotation.y = THREE.MathUtils.lerp(rabbit.rotation.y, angle, 0.15);

    // Clamp to field
    const limit = FIELD_SIZE * 0.8;
    rabbit.position.x = THREE.MathUtils.clamp(rabbit.position.x, -limit, limit);
    rabbit.position.z = THREE.MathUtils.clamp(rabbit.position.z, -limit, limit);
  }

  animateRabbit(dt, moving);
  if (moving) SoundEngine.playHop();

  // --- Fox AI ---
  foxSpeedBonus += FOX_ACCEL * dt;
  const foxSpeed = FOX_SPEED + foxSpeedBonus;
  const toRabbit = new THREE.Vector3().subVectors(rabbit.position, fox.position);
  toRabbit.y = 0;
  const dist = toRabbit.length();

  if (dist > 0.1) {
    toRabbit.normalize();
    fox.position.x += toRabbit.x * foxSpeed;
    fox.position.z += toRabbit.z * foxSpeed;

    // Fox faces rabbit
    const foxAngle = Math.atan2(toRabbit.x, toRabbit.z);
    fox.rotation.y = THREE.MathUtils.lerp(fox.rotation.y, foxAngle, 0.1);
  }

  animateFox(dt);

  // --- NPC & Snake updates ---
  updateNPCRabbits(dt);
  updateSnakes(dt);

  // --- Fox warning sound ---
  SoundEngine.updateFoxWarning(dist);

  // --- Dynamic drum track (proximity tension) ---
  SoundEngine.updateDrumTrack(dist);

  // --- Traffic Light Cycling ---
  trafficTimer += dt;
  if (trafficTimer >= TRAFFIC_CYCLE) {
    trafficTimer = 0;
    pedestrianGreen = !pedestrianGreen;
    updateTrafficLights();
  }

  // --- Car Movement ---
  for (const car of cars) {
    if (!shouldCarStop(car)) {
      const d = car.userData;
      if (d.horizontal) {
        car.position.x += d.direction * CAR_SPEED;
        if (car.position.x > ROAD_EXTENT) car.position.x = -ROAD_EXTENT;
        if (car.position.x < -ROAD_EXTENT) car.position.x = ROAD_EXTENT;
      } else {
        car.position.z += d.direction * CAR_SPEED;
        if (car.position.z > ROAD_EXTENT) car.position.z = -ROAD_EXTENT;
        if (car.position.z < -ROAD_EXTENT) car.position.z = ROAD_EXTENT;
      }
    }
  }

  // --- Car hits rabbit ---
  const carNow = performance.now();
  if (carNow - lastCarHitTime > CAR_HIT_COOLDOWN) {
    for (const car of cars) {
      const carDist = new THREE.Vector2(
        rabbit.position.x - car.position.x,
        rabbit.position.z - car.position.z
      ).length();
      if (carDist < CAR_HIT_DISTANCE) {
        lastCarHitTime = carNow;
        if (carrotsHeld > 0) {
          const lost = Math.min(carrotsHeld, CARROT_LOSS_ON_HIT);
          carrotsHeld -= lost;
          showMessage(`🚗 Påkörd! Tappade ${lost} ${lost > 1 ? 'morötter' : 'morot'}!`);
          flashScreen('rgba(255, 100, 0, 0.5)', 400);
          spawnFloatingText(rabbit.position.clone(), `-${lost} 🥕`, '#ff6600', 28);
          for (let i = 0; i < lost; i++) {
            const carrot = createCarrot();
            const sp = rabbit.position.clone();
            sp.x += (Math.random() - 0.5) * 5;
            sp.z += (Math.random() - 0.5) * 5;
            sp.y = 0;
            carrot.position.copy(sp);
            scene.add(carrot);
            carrots.push(carrot);
          }
        } else {
          showMessage('🚗 Påkörd! Se upp för trafiken!');
        }
        // Push rabbit away from car
        const pushDir = new THREE.Vector3().subVectors(rabbit.position, car.position).normalize();
        rabbit.position.x += pushDir.x * 3;
        rabbit.position.z += pushDir.z * 3;
        break;
      }
    }
  }

  // --- Fox catches rabbit ---
  const now = performance.now();
  if (dist < CATCH_DISTANCE && now - lastCatchTime > CATCH_COOLDOWN) {
    lastCatchTime = now;
    SoundEngine.playFoxCatch();
    if (carrotsHeld > 0) {
      const lost = Math.min(carrotsHeld, CARROT_LOSS_ON_CATCH);
      carrotsHeld -= lost;
      showMessage(`🦊 Räven stal ${lost} ${lost > 1 ? 'morötter' : 'morot'}!`);
      flashScreen('rgba(255, 0, 0, 0.6)', 400);
      spawnFloatingText(rabbit.position.clone(), `-${lost} 🥕`, '#ff4444', 28);
      spawnParticles(rabbit.position.clone(), 12, 0xff6600, 4, 1.2, -5);
      // Scatter lost carrots near fox
      for (let i = 0; i < lost; i++) {
        const carrot = createCarrot();
        const scatterPos = fox.position.clone();
        scatterPos.x += (Math.random() - 0.5) * 4;
        scatterPos.z += (Math.random() - 0.5) * 4;
        scatterPos.y = 0;
        carrot.position.copy(scatterPos);
        scene.add(carrot);
        carrots.push(carrot);
      }
    } else {
      showMessage('🦊 Räven nafsar på dig! Inga morötter att stjäla.');
      flashScreen('rgba(255, 100, 0, 0.3)', 300);
    }
    // Push fox back
    fox.position.x = rabbit.position.x - toRabbit.x * 5;
    fox.position.z = rabbit.position.z - toRabbit.z * 5;
  }

  // --- Carrot Collection ---
  for (let i = carrots.length - 1; i >= 0; i--) {
    const c = carrots[i];
    const d = rabbit.position.distanceTo(c.position);
    if (d < COLLECT_DISTANCE) {
      const collectPos = c.position.clone();
      scene.remove(c);
      carrots.splice(i, 1);
      carrotsHeld++;
      SoundEngine.playCarrotPickup();
      spawnFloatingText(collectPos, '+1 🥕', '#ffcc00', 24);
      spawnParticles(collectPos, 6, 0xff8800, 1.5, 0.8, -3);
      // Spawn replacement carrot elsewhere
      const newCarrot = createCarrot();
      newCarrot.position.copy(randomFieldPos());
      scene.add(newCarrot);
      carrots.push(newCarrot);
    }
  }

  // --- Burrow Deposit ---
  if (burrow && carrotsHeld > 0) {
    const dBurrow = rabbit.position.distanceTo(burrow.position);
    if (dBurrow < DEPOSIT_DISTANCE) {
      const deposit = Math.min(carrotsHeld, BURROW_CAPACITY - burrowFill);
      if (deposit > 0) {
        carrotsHeld -= deposit;
        burrowFill += deposit;
        totalScore += deposit * 10;
        updateBurrowVisuals();
        SoundEngine.playDeposit();
        showMessage(`+${deposit * 10} poäng! Lämnade ${deposit} ${deposit > 1 ? 'morötter' : 'morot'}`);
        spawnFloatingText(burrow.position.clone(), `+${deposit * 10} ⭐`, '#44ff88', 26);
        spawnParticles(burrow.position.clone(), 8, 0x44ff88, 2, 1.0, -2);
        flashScreen('rgba(0, 255, 100, 0.2)', 250);

        if (burrowFill >= BURROW_CAPACITY) {
          SoundEngine.playBurrowFull();
          showMessage('🕳️ Grytan är full! En ny har dykt upp!', 3000);
          spawnConfetti(burrow.position.clone(), 40);
          flashScreen('rgba(255, 215, 0, 0.4)', 500);
          spawnFloatingText(burrow.position.clone(), '🎉 FULL!', '#ffd700', 32);
          setTimeout(() => {
            SoundEngine.playNewHole();
            spawnBurrow();
            startBurrowBlink();
            spawnFloatingText(burrow.position.clone(), '🕳️ NEW!', '#88ddff', 28);
          }, 1500);
        }
      }
    }
  }

  // Animate carrots
  animateCarrots(gameTime);

  // --- Burrow pulse when nearby ---
  if (burrow) {
    const dBurrow = rabbit.position.distanceTo(burrow.position);
    const pulse = dBurrow < 3 ? 1 + Math.sin(gameTime * 4) * 0.05 : 1;
    burrow.scale.setScalar(pulse);
  }

  // Update visual effects
  updateParticles(dt);
  updateBurrowBlink(dt);

  updateHUD();
  updateCamera();
  drawMinimap();
}

function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();

// --- Touch/Desktop instruction toggle ---
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('instructions-desktop').style.display = 'none';
  document.getElementById('instructions-touch').style.display = 'inline';
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
