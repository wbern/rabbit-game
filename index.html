<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabbit Carrot Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#hud {
  position: fixed; top: 20px; left: 20px; color: #fff;
  font-size: 18px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  pointer-events: none; z-index: 10;
}
#hud div { margin-bottom: 6px; }
#burrow-bar {
  width: 200px; height: 16px; background: rgba(0,0,0,0.4);
  border: 2px solid #fff; border-radius: 8px; overflow: hidden;
}
#burrow-fill {
  height: 100%; background: linear-gradient(90deg, #ff8c00, #ffa500);
  transition: width 0.3s;
}
#message {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font-size: 28px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
  pointer-events: none; z-index: 10; opacity: 0; transition: opacity 0.5s;
}
#instructions {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.6); font-size: 14px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  pointer-events: none; z-index: 10;
}
</style>
</head>
<body>
<div id="hud">
  <div>🥕 Carrots: <span id="carrot-count">0</span></div>
  <div>🕳️ Burrow: <span id="burrow-status">0 / 5</span></div>
  <div id="burrow-bar"><div id="burrow-fill" style="width:0%"></div></div>
  <div>🏆 Score: <span id="score">0</span></div>
</div>
<div id="message"></div>
<div id="instructions">WASD to move · Collect carrots · Walk over burrow to deposit · Avoid the fox!</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// --- Game Config ---
const FIELD_SIZE = 40;
const CARROT_COUNT = 15;
const BURROW_CAPACITY = 5;
const FOX_SPEED = 0.04;
const RABBIT_SPEED = 0.08;
const CATCH_DISTANCE = 1.2;
const COLLECT_DISTANCE = 1.0;
const DEPOSIT_DISTANCE = 1.5;
const CARROT_LOSS_ON_CATCH = 2;
const CATCH_COOLDOWN = 2000; // ms
const FOX_ACCEL = 0.0001; // fox gets faster over time

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
sunLight.position.set(10, 20, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024, 1024);
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
scene.add(sunLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(FIELD_SIZE * 2, FIELD_SIZE * 2, 32, 32);
// Add slight terrain undulation
const posAttr = groundGeo.getAttribute('position');
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i);
  const y = posAttr.getY(i);
  posAttr.setZ(i, Math.sin(x * 0.3) * 0.2 + Math.cos(y * 0.2) * 0.15);
}
groundGeo.computeVertexNormals();
const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a8c3f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Decorative grass tufts
function createGrassTuft(x, z) {
  const group = new THREE.Group();
  for (let i = 0; i < 3; i++) {
    const h = 0.3 + Math.random() * 0.3;
    const blade = new THREE.Mesh(
      new THREE.ConeGeometry(0.05, h, 4),
      new THREE.MeshLambertMaterial({ color: 0x3a7c2f + Math.floor(Math.random() * 0x101000) })
    );
    blade.position.set((Math.random() - 0.5) * 0.3, h / 2, (Math.random() - 0.5) * 0.3);
    blade.rotation.z = (Math.random() - 0.5) * 0.3;
    group.add(blade);
  }
  group.position.set(x, 0, z);
  return group;
}
for (let i = 0; i < 80; i++) {
  const x = (Math.random() - 0.5) * FIELD_SIZE * 1.5;
  const z = (Math.random() - 0.5) * FIELD_SIZE * 1.5;
  scene.add(createGrassTuft(x, z));
}

// --- Rabbit ---
function createRabbit() {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0xd4c4a8 });
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const pinkMat = new THREE.MeshLambertMaterial({ color: 0xffb6c1 });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.4, 12, 10), bodyMat);
  body.scale.set(1, 0.85, 1.2);
  body.position.y = 0.45;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 10, 8), bodyMat);
  head.position.set(0, 0.85, 0.35);
  group.add(head);

  // Ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.35, 4, 6), bodyMat);
    ear.position.set(side * 0.12, 1.3, 0.3);
    ear.rotation.z = side * 0.15;
    ear.rotation.x = -0.1;
    group.add(ear);
    const earInner = new THREE.Mesh(new THREE.CapsuleGeometry(0.035, 0.25, 4, 6), pinkMat);
    earInner.position.set(side * 0.12, 1.28, 0.32);
    earInner.rotation.z = side * 0.15;
    earInner.rotation.x = -0.1;
    group.add(earInner);
  }

  // Eyes
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), darkMat);
    eye.position.set(side * 0.13, 0.9, 0.6);
    group.add(eye);
  }

  // Nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), pinkMat);
  nose.position.set(0, 0.82, 0.65);
  group.add(nose);

  // Tail
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), whiteMat);
  tail.position.set(0, 0.45, -0.55);
  group.add(tail);

  // Feet
  for (const side of [-1, 1]) {
    const foot = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), bodyMat);
    foot.scale.set(0.8, 0.5, 1.4);
    foot.position.set(side * 0.22, 0.08, 0.15);
    group.add(foot);
  }

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  return group;
}

const rabbit = createRabbit();
scene.add(rabbit);

// --- Fox ---
function createFox() {
  const group = new THREE.Group();
  const foxMat = new THREE.MeshLambertMaterial({ color: 0xd4652a });
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xf5f0e0 });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

  // Body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.45, 12, 10), foxMat);
  body.scale.set(1, 0.8, 1.5);
  body.position.y = 0.5;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 10, 8), foxMat);
  head.position.set(0, 0.75, 0.55);
  group.add(head);

  // Snout
  const snout = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.3, 8), whiteMat);
  snout.rotation.x = -Math.PI / 2;
  snout.position.set(0, 0.68, 0.82);
  group.add(snout);

  // Nose
  const noseTip = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), darkMat);
  noseTip.position.set(0, 0.68, 0.97);
  group.add(noseTip);

  // Ears
  for (const side of [-1, 1]) {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.2, 4), foxMat);
    ear.position.set(side * 0.15, 1.0, 0.45);
    group.add(ear);
  }

  // Eyes
  for (const side of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 6), darkMat);
    eye.position.set(side * 0.12, 0.82, 0.75);
    group.add(eye);
  }

  // Tail
  const tail = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.6, 6, 8), foxMat);
  tail.position.set(0, 0.45, -0.85);
  tail.rotation.x = 0.4;
  group.add(tail);
  const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), whiteMat);
  tailTip.position.set(0, 0.55, -1.1);
  group.add(tailTip);

  // Legs
  for (const side of [-1, 1]) {
    for (const fz of [0.3, -0.3]) {
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.35, 6), foxMat);
      leg.position.set(side * 0.25, 0.18, fz);
      group.add(leg);
    }
  }

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  return group;
}

const fox = createFox();
fox.position.set(15, 0, 15);
scene.add(fox);

// --- Carrots ---
function createCarrot() {
  const group = new THREE.Group();
  const carrotMat = new THREE.MeshLambertMaterial({ color: 0xff7722 });
  const greenMat = new THREE.MeshLambertMaterial({ color: 0x2d8c1a });

  const root = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.4, 8), carrotMat);
  root.position.y = 0.2;
  root.rotation.x = Math.PI;
  group.add(root);

  // Greens on top
  for (let i = 0; i < 3; i++) {
    const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.2, 4), greenMat);
    leaf.position.set((Math.random() - 0.5) * 0.06, 0.4 + Math.random() * 0.1, (Math.random() - 0.5) * 0.06);
    leaf.rotation.z = (Math.random() - 0.5) * 0.5;
    group.add(leaf);
  }

  group.traverse(c => { if (c.isMesh) { c.castShadow = true; } });
  return group;
}

function randomFieldPos() {
  return new THREE.Vector3(
    (Math.random() - 0.5) * FIELD_SIZE,
    0,
    (Math.random() - 0.5) * FIELD_SIZE
  );
}

const carrots = [];
function spawnCarrots(count) {
  for (let i = 0; i < count; i++) {
    const carrot = createCarrot();
    const pos = randomFieldPos();
    carrot.position.copy(pos);
    scene.add(carrot);
    carrots.push(carrot);
  }
}
spawnCarrots(CARROT_COUNT);

// --- Burrow ---
function createBurrow(pos) {
  const group = new THREE.Group();

  // Hole (dark circle)
  const hole = new THREE.Mesh(
    new THREE.CircleGeometry(0.7, 16),
    new THREE.MeshLambertMaterial({ color: 0x2a1a0a })
  );
  hole.rotation.x = -Math.PI / 2;
  hole.position.y = 0.01;
  group.add(hole);

  // Dirt mound ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.7, 0.15, 8, 16),
    new THREE.MeshLambertMaterial({ color: 0x8b6914 })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.05;
  group.add(ring);

  // Small carrots inside to show fill level (added dynamically)
  group.userData.fillIndicators = [];

  group.position.copy(pos);
  group.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  return group;
}

let burrow = null;
let burrowFill = 0;

function spawnBurrow() {
  if (burrow) scene.remove(burrow);
  const pos = randomFieldPos();
  pos.y = 0;
  burrow = createBurrow(pos);
  burrowFill = 0;
  scene.add(burrow);
  updateBurrowVisuals();
}

function updateBurrowVisuals() {
  // Remove old indicators
  for (const ind of burrow.userData.fillIndicators) {
    burrow.remove(ind);
  }
  burrow.userData.fillIndicators = [];

  // Add small carrots to show fill
  for (let i = 0; i < burrowFill; i++) {
    const angle = (i / BURROW_CAPACITY) * Math.PI * 2;
    const r = 0.3;
    const mini = new THREE.Mesh(
      new THREE.ConeGeometry(0.05, 0.2, 6),
      new THREE.MeshLambertMaterial({ color: 0xff7722 })
    );
    mini.position.set(Math.cos(angle) * r, 0.15, Math.sin(angle) * r);
    mini.rotation.x = Math.PI;
    burrow.add(mini);
    burrow.userData.fillIndicators.push(mini);
  }
}

spawnBurrow();

// --- Game State ---
let carrotsHeld = 0;
let totalScore = 0;
let lastCatchTime = 0;
let foxSpeedBonus = 0;
let gameTime = 0;

const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// --- HUD ---
const hudCarrots = document.getElementById('carrot-count');
const hudBurrow = document.getElementById('burrow-status');
const hudScore = document.getElementById('score');
const hudBurrowFill = document.getElementById('burrow-fill');
const messageEl = document.getElementById('message');

function updateHUD() {
  hudCarrots.textContent = carrotsHeld;
  hudBurrow.textContent = `${burrowFill} / ${BURROW_CAPACITY}`;
  hudBurrowFill.style.width = `${(burrowFill / BURROW_CAPACITY) * 100}%`;
  hudScore.textContent = totalScore;
}

let messageTimeout = null;
function showMessage(text, duration = 2000) {
  messageEl.textContent = text;
  messageEl.style.opacity = '1';
  clearTimeout(messageTimeout);
  messageTimeout = setTimeout(() => { messageEl.style.opacity = '0'; }, duration);
}

// --- Camera ---
const cameraOffset = new THREE.Vector3(0, 8, -10);

function updateCamera() {
  const target = rabbit.position.clone().add(cameraOffset);
  camera.position.lerp(target, 0.05);
  camera.lookAt(rabbit.position.x, 0.5, rabbit.position.z);
}

// --- Animation Helpers ---
let hopPhase = 0;

function animateRabbit(dt, moving) {
  if (moving) {
    hopPhase += dt * 10;
    rabbit.position.y = Math.abs(Math.sin(hopPhase)) * 0.2;
    // Slight body bob
    rabbit.children[0].position.y = 0.45 + Math.sin(hopPhase * 2) * 0.03;
  } else {
    rabbit.position.y = THREE.MathUtils.lerp(rabbit.position.y, 0, 0.1);
    // Idle ear twitch
    hopPhase += dt * 2;
  }
}

let foxAnimPhase = 0;
function animateFox(dt) {
  foxAnimPhase += dt * 8;
  fox.position.y = Math.abs(Math.sin(foxAnimPhase)) * 0.1;
}

// Carrot bob
function animateCarrots(time) {
  for (const c of carrots) {
    c.position.y = 0.1 + Math.sin(time * 2 + c.position.x * 0.5) * 0.08;
    c.rotation.y = time * 0.5;
  }
}

// --- Game Loop ---
const clock = new THREE.Clock();

function update() {
  const dt = Math.min(clock.getDelta(), 0.05);
  gameTime += dt;

  // --- Rabbit Movement ---
  const moveDir = new THREE.Vector3(0, 0, 0);
  if (keys['w'] || keys['arrowup']) moveDir.z += 1;
  if (keys['s'] || keys['arrowdown']) moveDir.z -= 1;
  if (keys['a'] || keys['arrowleft']) moveDir.x += 1;
  if (keys['d'] || keys['arrowright']) moveDir.x -= 1;

  const moving = moveDir.length() > 0;
  if (moving) {
    moveDir.normalize();
    rabbit.position.x += moveDir.x * RABBIT_SPEED;
    rabbit.position.z += moveDir.z * RABBIT_SPEED;

    // Face movement direction
    const angle = Math.atan2(moveDir.x, moveDir.z);
    rabbit.rotation.y = THREE.MathUtils.lerp(rabbit.rotation.y, angle, 0.15);

    // Clamp to field
    const limit = FIELD_SIZE * 0.8;
    rabbit.position.x = THREE.MathUtils.clamp(rabbit.position.x, -limit, limit);
    rabbit.position.z = THREE.MathUtils.clamp(rabbit.position.z, -limit, limit);
  }

  animateRabbit(dt, moving);

  // --- Fox AI ---
  foxSpeedBonus += FOX_ACCEL * dt;
  const foxSpeed = FOX_SPEED + foxSpeedBonus;
  const toRabbit = new THREE.Vector3().subVectors(rabbit.position, fox.position);
  toRabbit.y = 0;
  const dist = toRabbit.length();

  if (dist > 0.1) {
    toRabbit.normalize();
    fox.position.x += toRabbit.x * foxSpeed;
    fox.position.z += toRabbit.z * foxSpeed;

    // Fox faces rabbit
    const foxAngle = Math.atan2(toRabbit.x, toRabbit.z);
    fox.rotation.y = THREE.MathUtils.lerp(fox.rotation.y, foxAngle, 0.1);
  }

  animateFox(dt);

  // --- Fox catches rabbit ---
  const now = performance.now();
  if (dist < CATCH_DISTANCE && now - lastCatchTime > CATCH_COOLDOWN) {
    lastCatchTime = now;
    if (carrotsHeld > 0) {
      const lost = Math.min(carrotsHeld, CARROT_LOSS_ON_CATCH);
      carrotsHeld -= lost;
      showMessage(`🦊 The fox stole ${lost} carrot${lost > 1 ? 's' : ''}!`);
      // Scatter lost carrots near fox
      for (let i = 0; i < lost; i++) {
        const carrot = createCarrot();
        const scatterPos = fox.position.clone();
        scatterPos.x += (Math.random() - 0.5) * 4;
        scatterPos.z += (Math.random() - 0.5) * 4;
        scatterPos.y = 0;
        carrot.position.copy(scatterPos);
        scene.add(carrot);
        carrots.push(carrot);
      }
    } else {
      showMessage('🦊 The fox nips at you! No carrots to steal.');
    }
    // Push fox back
    fox.position.x = rabbit.position.x - toRabbit.x * 5;
    fox.position.z = rabbit.position.z - toRabbit.z * 5;
  }

  // --- Carrot Collection ---
  for (let i = carrots.length - 1; i >= 0; i--) {
    const c = carrots[i];
    const d = rabbit.position.distanceTo(c.position);
    if (d < COLLECT_DISTANCE) {
      scene.remove(c);
      carrots.splice(i, 1);
      carrotsHeld++;
      // Spawn replacement carrot elsewhere
      const newCarrot = createCarrot();
      newCarrot.position.copy(randomFieldPos());
      scene.add(newCarrot);
      carrots.push(newCarrot);
    }
  }

  // --- Burrow Deposit ---
  if (burrow && carrotsHeld > 0) {
    const dBurrow = rabbit.position.distanceTo(burrow.position);
    if (dBurrow < DEPOSIT_DISTANCE) {
      const deposit = Math.min(carrotsHeld, BURROW_CAPACITY - burrowFill);
      if (deposit > 0) {
        carrotsHeld -= deposit;
        burrowFill += deposit;
        totalScore += deposit * 10;
        updateBurrowVisuals();
        showMessage(`+${deposit * 10} points! Deposited ${deposit} carrot${deposit > 1 ? 's' : ''}`);

        if (burrowFill >= BURROW_CAPACITY) {
          showMessage('🕳️ Burrow full! A new one appeared!', 3000);
          setTimeout(() => spawnBurrow(), 1500);
        }
      }
    }
  }

  // Animate carrots
  animateCarrots(gameTime);

  // --- Burrow pulse when nearby ---
  if (burrow) {
    const dBurrow = rabbit.position.distanceTo(burrow.position);
    const pulse = dBurrow < 3 ? 1 + Math.sin(gameTime * 4) * 0.05 : 1;
    burrow.scale.setScalar(pulse);
  }

  updateHUD();
  updateCamera();
}

function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
